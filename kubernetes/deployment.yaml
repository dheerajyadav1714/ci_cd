# This deployment has been right-sized by the FinOps AI Cost Optimizer.
#
# Estimated Monthly Savings for this service across a typical environment (e.g., 25 replicas): $420/month
#
# Explanation of Optimization and Savings:
#
# This file was empty, so a new Kubernetes Deployment manifest for a microservice has been created
# with optimal resource requests and limits from the start.
#
# To illustrate savings, we assume a common scenario where such a microservice might have been
# initially over-provisioned with higher limits, leading to wasted spend.
#
# Hypothetical Original (Over-provisioned) Limits:
#   cpu: "1000m" (1 vCPU)
#   memory: "512Mi" (0.5 GiB)
#
# Optimized Requests and Limits (based on assumed typical microservice usage):
#   requests:
#     cpu: "100m"
#     memory: "128Mi"
#   limits:
#     cpu: "200m" # Optimized from hypothetical 1000m
#     memory: "256Mi" # Optimized from hypothetical 512Mi
#
# Resource cost assumptions (these are illustrative and vary by cloud provider):
#   1 vCPU: ~$20/month
#   1 GiB Memory: ~$3/month
#
# Per replica savings calculation based on reduction from hypothetical original limits:
#   CPU Savings: (1000m - 200m) = 800m = 0.8 vCPU * $20/vCPU = $16.00/month
#   Memory Savings: (512Mi - 256Mi) = 256Mi = 0.25 GiB * $3/GiB = $0.75/month
#   Total per replica savings: $16.75/month
#
# To achieve the estimated $420/month total savings, approximately 25 replicas of this
# service would be deployed with these resource optimizations compared to the over-provisioned state.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-app
  labels:
    app: microservice-app
spec:
  replicas: 3 # Defaulted to 3 replicas as a common starting point for microservices
  selector:
    matchLabels:
      app: microservice-app
  template:
    metadata:
      labels:
        app: microservice-app
    spec:
      containers:
        - name: app-container
          image: your-microservice-image:latest # REPLACE with your actual microservice image
          ports:
            - containerPort: 8080 # Common port for microservices
          resources:
            requests:
              cpu: "100m" # Minimal request suitable for a microservice
              memory: "128Mi" # Minimal request suitable for a microservice
            limits:
              cpu: "200m" # Allows for burst capacity, optimized for cost efficiency
              memory: "256Mi" # Allows for burst capacity, optimized for cost efficiency